name: staging-smoke

on:
  workflow_dispatch:

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    permissions:
      contents: read

    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      STAGING_SMOKE_CONFIRM: read-only
      STAGING_SMOKE_REPORT_PATH: artifacts/staging-smoke/latest.json
      OPENAI_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run read-only staging smoke
        run: npm run smoke:staging

      - name: Upload staging smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-report
          path: artifacts/staging-smoke/
          if-no-files-found: ignore
